name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag to release, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin --config src-tauri/tauri.release.generated.conf.json"
            artifactPlatform: macos
          - label: Linux x64 AppImage
            platform: ubuntu-22.04
            args: "--config src-tauri/tauri.release.generated.conf.json"
            artifactPlatform: linux

    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
      NARVIEW_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use SemVer, for example v0.1.0 or v0.1.0-beta.1."
            exit 1
          fi

          APP_VERSION="${TAG_NAME#v}"
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const tauri=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); if (pkg.version !== '$APP_VERSION' || tauri.version !== '$APP_VERSION') { throw new Error('Tag $TAG_NAME must match package.json and tauri.conf.json version ' + pkg.version); }"

          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name must be configured before publishing signed updater artifacts."
              exit 1
            fi
          done

      - name: Install Linux Tauri dependencies
        if: matrix.artifactPlatform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.artifactPlatform == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run release dry-run checks
        run: npm run test:release-config

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Build web assets
        run: npm run build

      - name: Prepare Tauri release config
        run: node scripts/prepare-tauri-release-config.mjs --output src-tauri/tauri.release.generated.conf.json

      - name: Build, sign, and publish Tauri artifacts
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: Narview ${{ env.TAG_NAME }}
          releaseBody: |
            Installers and signed updater metadata for Narview ${{ env.TAG_NAME }}.

            ## macOS

            These release-candidate builds are ad-hoc signed but not Apple Developer ID notarized yet. If macOS says Narview is damaged or cannot be verified:

            1. Drag Narview.app to Applications.
            2. Run:

               ```bash
               xattr -cr "/Applications/Narview.app"
               ```

            3. Open Narview again.

            Fully normal macOS first-open behavior requires Apple Developer ID signing and notarization secrets.

            ## Linux

            Download the AppImage, make it executable, then open it:

            ```bash
            chmod +x Narview_*_amd64.AppImage
            ./Narview_*_amd64.AppImage
            ```
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify release artifact paths
        run: node scripts/verify-release-artifacts.mjs --platform "${{ matrix.artifactPlatform }}" --artifact-paths '${{ steps.tauri.outputs.artifactPaths }}'
