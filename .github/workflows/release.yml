name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag to release, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifactPlatform: macos
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifactPlatform: macos
          - label: Linux x64 AppImage
            platform: ubuntu-22.04
            args: ""
            artifactPlatform: linux

    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use SemVer, for example v0.1.0 or v0.1.0-beta.1."
            exit 1
          fi

          APP_VERSION="${TAG_NAME#v}"
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const tauri=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); if (pkg.version !== '$APP_VERSION' || tauri.version !== '$APP_VERSION') { throw new Error('Tag $TAG_NAME must match package.json and tauri.conf.json version ' + pkg.version); }"

      - name: Install Linux Tauri dependencies
        if: matrix.artifactPlatform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.artifactPlatform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run release dry-run checks
        run: npm run test:release-config

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Build web assets
        run: npm run build

      - name: Build and publish Tauri artifacts
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: Narview ${{ env.TAG_NAME }}
          releaseBody: Installers for Narview ${{ env.TAG_NAME }}. Updater signing metadata can be enabled when release signing is configured.
          releaseDraft: false
          prerelease: ${{ contains(env.TAG_NAME, '-') }}
          args: ${{ matrix.args }}
